name: Update World Cup Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le projet
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generer le calendrier
        run: python generate_calendar.py

      - name: Sauvegarder le fichier ics
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add worldcup2026.ics
          git commit -m "Update calendar" || echo "Aucun changement"
          git push